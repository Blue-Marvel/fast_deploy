name: fast_deploy
description: "Desktop app for shipping Flutter releases & Shorebird patches without leaving your machine."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # File picking & opening
  file_picker: ^8.1.7
  url_launcher: ^6.3.1

  # Time
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  dmg: ^0.1.10

flutter:
  uses-material-design: true

  assets:
    - assets/scripts/
    - assets/workflows/
